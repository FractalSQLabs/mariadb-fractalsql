# mariadb-fractalsql benchmark harness.
#
# Two services, each pinned to exactly one CPU so numbers are
# reproducible across machines with different core counts:
#
#   mariadb  — runs the target server with the UDF pre-installed
#   tester   — Node.js 24 driver that issues the benchmark queries
#
# Parameterise the server version via env:
#   MARIADB_IMAGE=mariadb:10.6  FRACTAL_SO=fractal_mdb106.so  \
#   docker compose -f benchmark/docker-compose.test.yml up --abort-on-container-exit
#
#   MARIADB_IMAGE=mariadb:11.4  FRACTAL_SO=fractal_mdb114.so  \
#   docker compose -f benchmark/docker-compose.test.yml up --abort-on-container-exit

services:
  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:11.4}
    container_name: fractal-bench-mariadb
    cpus: 1.0
    cpuset: "0"
    mem_limit: 2g
    environment:
      MARIADB_ROOT_PASSWORD: fractal
      MARIADB_DATABASE: fractal
    volumes:
      - ../dist/amd64/${FRACTAL_SO:-fractal_mdb114.so}:/usr/lib/mysql/plugin/fractalsql.so:ro
      - ../sql/install_udf.sql:/docker-entrypoint-initdb.d/01-install-udf.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -pfractal --silent"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - bench

  tester:
    image: node:24-bookworm-slim
    container_name: fractal-bench-tester
    cpus: 1.0
    cpuset: "1"
    mem_limit: 1g
    depends_on:
      mariadb:
        condition: service_healthy
    working_dir: /tester
    volumes:
      - ./tester:/tester
    environment:
      MYSQL_HOST: mariadb
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: fractal
      MYSQL_DATABASE: fractal
      BENCH_N: "1000"
      BENCH_DIM: "128"
      BENCH_K: "10"
      BENCH_ITERATIONS: "500"
    command: ["sh", "-c", "npm install --omit=dev && node run.js"]
    networks:
      - bench

networks:
  bench:
    driver: bridge
