name: Release mariadb-fractalsql Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # Linux: build fractalsql.so per arch. The UDF ABI is stable across
  # MariaDB 10.6 / 10.11 / 11.4 LTS and 12.2 rolling, so one .so per
  # arch covers the whole supported range — no per-major fan-in.
  #
  # amd64 gets a native smoke test inside real mariadb:11.4 AND
  # mariadb:12.2 containers (edition + version + fractal_search
  # cosine-similarity convergence) — same .so in, both containers out,
  # which is the actual cross-major-ABI proof.
  # arm64 skips the smoke test — QEMU + mariadbd is too slow and flaky,
  # and the Dockerfile's post-link assertions already validate the
  # arm64 ABI (ldd shortlist, .dynsym exports, size ceiling).
  # ------------------------------------------------------------------
  build:
    name: build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build fractalsql.so for ${{ matrix.arch }}
        run: |
          chmod +x build.sh
          ./build.sh ${{ matrix.arch }}
          ls -l dist/${{ matrix.arch }}/fractalsql.so

      - name: Smoke test (edition/version + fractal_search convergence)
        if: matrix.arch == 'amd64'
        run: |
          set -euo pipefail
          SO="dist/amd64/fractalsql.so"

          # Validate the same fractalsql.so against both a current LTS
          # (11.4) and a current rolling release (12.2). Same binary in,
          # both containers out — proves the UDF ABI stability claim
          # instead of just asserting it in commentary.
          for TAG in 11.4 12.2; do
              M="mdb-${TAG}"
              echo "=============================================="
              echo "  Smoke test against mariadb:${TAG}"
              echo "=============================================="

              docker run -d --name "${M}" \
                  -e MARIADB_ROOT_PASSWORD=test \
                  "mariadb:${TAG}"

              # The mariadb image runs a two-phase bootstrap: a
              # temporary mariadbd on the unix socket populates the
              # data dir and applies MARIADB_ROOT_PASSWORD, then the
              # server restarts for production use. Polling
              # `mariadb-admin ping` can succeed during phase 1 BEFORE
              # the password is applied, and subsequent -ptest calls
              # then fail with "Access denied for user 'root'@'localhost'
              # (using password: YES)" once phase 2 kicks in.
              #
              # healthcheck.sh (shipped inside the image specifically
              # for this) waits for both connectability AND innodb
              # initialization, i.e. the full production state.
              for i in $(seq 1 90); do
                  if docker exec "${M}" healthcheck.sh \
                        --connect --innodb_initialized >/dev/null 2>&1; then
                      break
                  fi
                  sleep 1
              done
              docker exec "${M}" healthcheck.sh --connect --innodb_initialized

              # All subsequent client calls force --protocol=socket so
              # we stay on the unix-socket code path — that avoids the
              # TLS handshake that mariadb 11.4+ defaults to on TCP,
              # which was producing "TLS/SSL error: Broken pipe (32)"
              # in CI.
              MC="mariadb --protocol=socket -uroot -ptest"

              docker cp "${SO}" "${M}:/usr/lib/mysql/plugin/fractalsql.so"
              docker exec -i "${M}" ${MC} < sql/install_udf.sql

              EDITION=$(docker exec "${M}" ${MC} -N -B -e \
                  "SELECT fractalsql_edition();")
              echo "[${TAG}] edition: ${EDITION}"
              test "${EDITION}" = "Community"

              VERSION=$(docker exec "${M}" ${MC} -N -B -e \
                  "SELECT fractalsql_version();")
              echo "[${TAG}] version: ${VERSION}"
              test "${VERSION}" = "1.0.0"

              # Convergence sanity check. query = (0.6, 0.8), objective
              # is cosine distance. Cosine distance is magnitude-
              # invariant, so every point on the ray through the origin
              # and (0.6, 0.8) is a global optimum — the coordinates
              # SFS returns can land anywhere along that ray inside
              # [-1, 1]^2. We assert the invariant the optimizer is
              # actually minimizing: cosine similarity to the query
              # should be essentially 1. ||query||^2 = 0.6^2+0.8^2 = 1,
              # so cos_sim simplifies to (v . query) / ||v||.
              RESULT=$(docker exec "${M}" ${MC} -N -B -e "
                  SET @r = fractal_search('', '0.6,0.8', 1,
                                          '{\"iterations\":100,\"population_size\":50}');
                  SELECT CASE
                      WHEN SQRT(v1*v1 + v2*v2) > 1e-9
                       AND (v1*0.6 + v2*0.8) / SQRT(v1*v1 + v2*v2) > 0.99
                      THEN 'ok'
                      ELSE CONCAT('FAIL v=', v1, ',', v2)
                  END
                  FROM (
                      SELECT
                        CAST(JSON_EXTRACT(@r, '\$.best_point[0]') AS DOUBLE) AS v1,
                        CAST(JSON_EXTRACT(@r, '\$.best_point[1]') AS DOUBLE) AS v2
                  ) t;")
              echo "[${TAG}] convergence: ${RESULT}"
              test "${RESULT}" = "ok"

              docker rm -f "${M}"
          done

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-fractalsql-${{ matrix.arch }}-so
          path: dist/${{ matrix.arch }}/fractalsql.so
          if-no-files-found: error

  # ------------------------------------------------------------------
  # One packaging cell per arch. Pulls the per-arch .so from the build
  # jobs, runs scripts/package.sh to produce .deb + .rpm, and verifies
  # no luajit runtime dep leaked into the package metadata.
  # ------------------------------------------------------------------
  package:
    name: package ${{ matrix.arch }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download fractalsql.so
        uses: actions/download-artifact@v4
        with:
          name: mariadb-fractalsql-${{ matrix.arch }}-so
          path: dist/${{ matrix.arch }}

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Build .deb and .rpm for ${{ matrix.arch }}
        run: |
          chmod +x scripts/package.sh
          scripts/package.sh ${{ matrix.arch }}
          ls -l dist/packages

      - name: Verify packages declare no luajit dependency
        run: |
          set -euo pipefail
          for deb in dist/packages/*-${{ matrix.arch }}.deb; do
              echo "=== ${deb} ==="
              DEPS=$(dpkg-deb -f "${deb}" Depends)
              echo "Depends: ${DEPS}"
              if echo "${DEPS}" | grep -iE 'luajit'; then
                  echo "FAIL: ${deb} declares a luajit dependency" >&2
                  exit 1
              fi
          done
          for rpm in dist/packages/*-${{ matrix.arch }}.rpm; do
              echo "=== ${rpm} ==="
              REQS=$(rpm -qpR "${rpm}" || true)
              echo "Requires:"
              echo "${REQS}"
              if echo "${REQS}" | grep -iE '^luajit'; then
                  echo "FAIL: ${rpm} declares a luajit requirement" >&2
                  exit 1
              fi
          done

      - name: Verify packages ship LICENSE files
        run: |
          set -euo pipefail
          for deb in dist/packages/*-${{ matrix.arch }}.deb; do
              echo "=== ${deb} ==="
              CONTENTS=$(dpkg-deb -c "${deb}")
              echo "${CONTENTS}" | grep -E 'usr/share/doc/mariadb-fractalsql/LICENSE$'
              echo "${CONTENTS}" | grep -E 'usr/share/doc/mariadb-fractalsql/LICENSE-THIRD-PARTY$'
          done
          for rpm in dist/packages/*-${{ matrix.arch }}.rpm; do
              echo "=== ${rpm} ==="
              CONTENTS=$(rpm -qlp "${rpm}")
              echo "${CONTENTS}" | grep -E '/usr/share/doc/mariadb-fractalsql/LICENSE$'
              echo "${CONTENTS}" | grep -E '/usr/share/doc/mariadb-fractalsql/LICENSE-THIRD-PARTY$'
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-fractalsql-${{ matrix.arch }}
          path: dist/packages/*
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # Windows: fractalsql.dll + FractalSQL-MariaDB-<MAJOR>-<VER>-x64.msi
  #
  # Matrix — x64 only.
  #   x86   : MariaDB Foundation stopped publishing 32-bit Windows
  #           server binaries after 10.4, so there's no host server
  #           for a 32-bit UDF DLL on the current LTS majors.
  #   arm64 : MariaDB does not yet ship Windows ARM64 server binaries
  #           in an extractable .zip form. The current distribution
  #           is MSI-only for any ARM64 coverage, which would require
  #           7-Zip silent extraction to harvest include\mysql\*.h —
  #           deferring this cell per the brief ("defer rather than
  #           half-implement").
  #   x64   : full coverage for 10.6 / 10.11 / 11.4 LTS and 12.2
  #           rolling via the official archive.mariadb.org
  #           mariadb-<VER>-winx64.zip publishes.
  #
  # The minor versions pinned below (10.6.20 etc.) are current as of
  # the first tagged release; bump MARIADB_VER when rolling forward.
  # If a pin goes stale (archive.mariadb.org 404s), CI fails at the
  # download step.
  # ------------------------------------------------------------------
  build-windows-msi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - mariadb_major: "10.6"
            mariadb_ver:   "10.6.20"
            arch: x64
            runner: windows-latest
          - mariadb_major: "10.11"
            mariadb_ver:   "10.11.10"
            arch: x64
            runner: windows-latest
          - mariadb_major: "11.4"
            mariadb_ver:   "11.4.4"
            arch: x64
            runner: windows-latest
          - mariadb_major: "12.2"
            mariadb_ver:   "12.2.2"
            arch: x64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    name: windows mdb${{ matrix.mariadb_major }} / ${{ matrix.arch }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up MSVC dev cmd (${{ matrix.arch }})
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install WiX Toolset (provides candle.exe + light.exe)
        shell: pwsh
        run: |
          choco install -y --no-progress wixtoolset

          # On the x64 runner, choco shims candle/light into
          # C:\ProgramData\chocolatey\bin automatically. Still, locate
          # the real bin and append it to $GITHUB_PATH to cover
          # chocolatey shim drift and future ARM64 runners.
          $wixBin = $null
          $candidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          )
          foreach ($c in $candidates) {
            if (Test-Path (Join-Path $c "candle.exe")) { $wixBin = $c; break }
          }
          if (-not $wixBin) {
            Write-Host "Searching under Program Files for candle.exe..."
            $hit = Get-ChildItem -Path "C:\Program Files (x86)", "C:\Program Files" `
                     -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue `
                   | Select-Object -First 1
            if ($hit) { $wixBin = $hit.DirectoryName }
          }
          if (-not $wixBin) {
            Write-Host "FATAL: candle.exe not found after choco install wixtoolset"
            exit 1
          }
          Write-Host "WiX bin dir: $wixBin"
          Add-Content -Path $env:GITHUB_PATH -Value $wixBin

      - name: Clone + build static LuaJIT 2.1 with MSVC
        shell: cmd
        run: |
          if not exist deps mkdir deps
          git clone --depth 1 --branch v2.1 https://github.com/LuaJIT/LuaJIT.git deps\LuaJIT
          cd deps\LuaJIT\src
          call msvcbuild.bat static
          if not exist lua51.lib (
            echo ==^> LuaJIT static build failed
            exit /b 1
          )
          dir lua51.lib lua.h

      - name: Download + unpack MariaDB ${{ matrix.mariadb_ver }} ${{ matrix.arch }} binaries
        shell: pwsh
        env:
          MARIADB_VER: ${{ matrix.mariadb_ver }}
          MARIADB_ARCH: ${{ matrix.arch }}
        run: |
          # archive.mariadb.org hosts per-version winx64 zips that
          # contain a full mariadb-<VER>-winx64\ tree including
          # include\mysql\ with the UDF headers. UDFs do not need a
          # server import lib — the server loads the DLL and calls the
          # exported entry points by name.
          $zipName = "mariadb-${env:MARIADB_VER}-win${env:MARIADB_ARCH}.zip"
          $url     = "https://archive.mariadb.org/mariadb-${env:MARIADB_VER}/winx64-packages/$zipName"
          Write-Host "Fetching $url"
          New-Item -ItemType Directory -Force -Path deps\mariadb | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "deps\mariadb\mariadb.zip" -UseBasicParsing
          Expand-Archive -Path "deps\mariadb\mariadb.zip" -DestinationPath "deps\mariadb" -Force

          $unpacked = "deps\mariadb\mariadb-${env:MARIADB_VER}-win${env:MARIADB_ARCH}"
          if (Test-Path $unpacked) {
            Rename-Item -Path $unpacked -NewName "root"
          } else {
            Write-Host "FATAL: expected $unpacked inside $zipName"
            Get-ChildItem deps\mariadb -Recurse -Depth 2 | Format-Table
            exit 1
          }
          if (-not (Test-Path "deps\mariadb\root\include\mysql\mysql.h")) {
            Write-Host "FATAL: include\mysql\mysql.h missing from unpacked tree"
            exit 1
          }

      - name: Build fractalsql.dll (/MT static CRT, /GL WPO, MariaDB ${{ matrix.mariadb_major }})
        shell: cmd
        env:
          MARIADB_MAJOR: ${{ matrix.mariadb_major }}
        run: |
          set LUAJIT_DIR=%CD%\deps\LuaJIT\src
          set MARIADB_DIR=%CD%\deps\mariadb\root
          set OUT_DIR=%CD%\dist\windows\mdb%MARIADB_MAJOR%
          if not exist "%OUT_DIR%" mkdir "%OUT_DIR%"
          call scripts\windows\build.bat
          if errorlevel 1 exit /b 1
          dir "%OUT_DIR%\fractalsql.dll"

      - name: Smoke-check fractalsql.dll dependencies (dumpbin)
        shell: pwsh
        env:
          MARIADB_MAJOR: ${{ matrix.mariadb_major }}
        run: |
          $dll = "dist\windows\mdb${env:MARIADB_MAJOR}\fractalsql.dll"
          $deps = dumpbin /dependents $dll
          Write-Host ($deps -join "`n")
          if ($deps -match 'vcruntime|msvcp140|msvcr\d') {
              Write-Host '==> FAIL: .dll depends on MSVC redistributable DLLs'
              exit 1
          }
          if ($deps -match 'lua51\.dll|libluajit') {
              Write-Host '==> FAIL: .dll depends on a dynamic LuaJIT'
              exit 1
          }
          Write-Host '==> OK: static CRT + static LuaJIT posture'

      - name: Verify UDF entry points exported (dumpbin /exports)
        shell: pwsh
        env:
          MARIADB_MAJOR: ${{ matrix.mariadb_major }}
        run: |
          $dll = "dist\windows\mdb${env:MARIADB_MAJOR}\fractalsql.dll"
          $exports = dumpbin /exports $dll
          Write-Host ($exports -join "`n")
          foreach ($sym in @(
                'fractal_search','fractal_search_init','fractal_search_deinit',
                'fractalsql_edition','fractalsql_edition_init','fractalsql_edition_deinit',
                'fractalsql_version','fractalsql_version_init','fractalsql_version_deinit')) {
              if (-not ($exports -match "\b$sym\b")) {
                  Write-Host "==> FAIL: $sym missing from export table"
                  exit 1
              }
          }
          Write-Host '==> OK: all UDF entry points exported'

      - name: Build MSI (candle + light, MariaDB ${{ matrix.mariadb_major }} / ${{ matrix.arch }})
        shell: cmd
        env:
          MARIADB_MAJOR: ${{ matrix.mariadb_major }}
          MSI_ARCH:      ${{ matrix.arch }}
        run: |
          call scripts\windows\build-msi.bat
          if errorlevel 1 exit /b 1
          dir dist\windows\*.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mariadb-fractalsql-windows-mdb${{ matrix.mariadb_major }}-${{ matrix.arch }}
          path: dist/windows/FractalSQL-MariaDB-${{ matrix.mariadb_major }}-*-${{ matrix.arch }}.msi
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/windows/FractalSQL-MariaDB-${{ matrix.mariadb_major }}-*-${{ matrix.arch }}.msi
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
